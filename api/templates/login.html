<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - NodeSnap</title>
    <style>
        :root {
            --bg:       #0d1117;
            --bg-alt:   #161b22;
            --border:   #30363d;
            --text:     #e6edf3;
            --text-dim: #8b949e;
            --accent:   #58a6ff;
            --accent-h: #79c0ff;
            --red:      #f85149;
            --purple:   #bc8cff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .login-card {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            text-align: center;
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }
        .logo::before { content: "◆ "; color: var(--purple); }
        .tagline {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .form-group { margin-bottom: 1.25rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem 0.9rem;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }
        .btn:hover { background: var(--accent-h); }
        .error {
            background: #3a1a1a;
            border: 1px solid var(--red);
            color: #ffa198;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
        }
        .footer {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.8rem;
            margin-top: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">NodeSnap</div>
        <div class="tagline">Network Configuration Backup System</div>

        {% if error %}
        <div class="error">⚠ {{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn">Se connecter</button>
        </form>

        <div class="footer">NodeSnap v0.1.0</div>
    </div>
</body>
</html>
